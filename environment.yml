name: calligraphy-efd
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # Scientific stack (conda-forge versions are well-tested)
  - numpy>=1.24,<2.0
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  # Notebook + dev
  - jupyter
  - pytest
  # Font parsing (available on conda-forge)
  - fonttools>=4.40
  # pyefd is pip-only — no conda-forge package exists
  - pip:
    - pyefd>=1.6
